<!DOCTYPE html>
<html lang="fr" data-theme="">
<head>
<meta charset="UTF-8">
<script>(function(){var t=localStorage.getItem('theme');if(t==='dark'){document.documentElement.setAttribute('data-theme','dark');}})();</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Page introuvable &mdash; ConvertisseurMesure</title>
<link rel="icon" type="image/png" href="/favicon.png">
<meta name="theme-color" content="#0F766E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#0F766E;--blue-l:#F0FDFA;--blue-d:#0d5e57;
  --gray-100:#F3F4F6;--gray-200:#E5E7EB;--gray-400:#9CA3AF;
  --gray-500:#6B7280;--gray-700:#374151;--gray-900:#111827;
  --white:#FFFFFF;--body-bg:#dde6ef;--radius:14px;--radius-sm:8px;
}
[data-theme="dark"]{--body-bg:#080e18;--white:#0f172a;--gray-100:#313c4a;--gray-200:#3e4a5a;--gray-400:#7a8798;--gray-500:#b8c2cf;--gray-700:#d6dde6;--gray-900:#ffffff;}
body{font-family:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;background:var(--body-bg);color:var(--gray-900);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
.card{background:var(--white);border-radius:var(--radius);box-shadow:0 1px 2px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.06);padding:48px 40px;max-width:480px;width:100%;border:1px solid var(--gray-200);}
.error-code{font-size:72px;font-weight:800;color:var(--blue);line-height:1;margin-bottom:8px;font-variant-numeric:tabular-nums;}
.error-title{font-size:22px;font-weight:700;margin-bottom:12px}
.error-desc{font-size:14px;color:var(--gray-500);line-height:1.6;margin-bottom:28px}
.btn-home{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:var(--blue);color:#fff;border-radius:var(--radius-sm);font-size:14px;font-weight:700;text-decoration:none;transition:opacity 150ms}
.btn-home:hover{opacity:.88}
.divider{width:48px;height:3px;background:var(--blue-l);border-radius:2px;margin:20px auto}
</style>
</head>
<body>
<div class="card">
  <div class="error-code">404</div>
  <div class="divider"></div>
  <h1 class="error-title">Page introuvable</h1>
  <p class="error-desc">La page que vous cherchez n&rsquo;existe pas ou a &eacute;t&eacute; d&eacute;plac&eacute;e. Retournez au convertisseur pour effectuer votre conversion d&rsquo;unit&eacute;s.</p>
  <a href="/" class="btn-home">Retour au convertisseur</a>
</div>
</body>
</html>
